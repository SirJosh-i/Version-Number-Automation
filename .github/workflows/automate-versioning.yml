name: Auto Versioning with Tests & Healthcheck

on:
  push:
    branches:
      - "**"
      
permissions:
  contents: write   # <-- THIS FIXES THE 403


jobs:
  versioning:
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required to read tags

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Read commit message
        id: commit_msg
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: version
        run: |
          TAG=${{ steps.get_tag.outputs.latest_tag }}
          MSG="${{ steps.commit_msg.outputs.commit_msg }}"

          VERSION=${TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [[ "$MSG" == MINOR:* ]]; then
            PATCH=$((PATCH + 1))
          elif [[ "$MSG" == MAJOR:* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            echo "No version bump keyword found. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ------------------ TESTING ------------------
      - name: Run tests
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "Running tests..."
          # Example:
          # npm install
          # npm test
          echo "Tests passed"

      # ------------------ HEALTH CHECK ------------------
      - name: Health check
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "Running health check..."
          # Example for HTTP service:
          # curl -f http://localhost:8080/health || exit 1
          echo "Health check passed"

      # ------------------ TAGGING ------------------
      - name: Create and push git tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.version.outputs.new_version }}
          git push origin ${{ steps.version.outputs.new_version }}
